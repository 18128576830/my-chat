<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>公开聊天室</title>
<style>
body{font-family:Arial;background:#f0f0f0;margin:0;padding:15px}
.main{max-width:500px;margin:auto;background:white;padding:15px;border-radius:10px}
#chat{display:none}
#msgs{height:350px;background:#f9f9f9;padding:10px;border-radius:8px;overflow-y:auto;margin-bottom:10px}
.msg{margin:5px 0;padding:8px 12px;border-radius:8px}
.other{background:#eaeaea}
.me{background:#007bff;color:white;text-align:right}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
button{background:#007bff;color:white;border:none}
</style>
</head>

<body>
<div class="main">
  <div id="namePage">
    <h3>输入昵称开始聊天</h3>
    <input id="nick" placeholder="输入你的昵称">
    <button onclick="go()">进入聊天室</button>
  </div>

  <div id="chat">
    <div id="msgs"></div>
    <input id="msg" placeholder="输入消息">
    <button onclick="send()">发送</button>
    <button onclick="logout()">退出</button>
  </div>
</div>

<script>
let nick = "";
const s = "https://api.yuchang123.com/chat";

async function go() {
  nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("请输入昵称");
  document.getElementById("namePage").style.display = "none";
  document.getElementById("chat").style.display = "block";
  start();
}

function logout() {
  nick = "";
  document.getElementById("namePage").style.display = "block";
  document.getElementById("chat").style.display = "none";
}

async function send() {
  let txt = document.getElementById("msg").value.trim();
  if (!txt || !nick) return;
  await fetch(s + "/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: nick, text: txt })
  });
  document.getElementById("msg").value = "";
}

function start() {
  setInterval(async () => {
    let res = await fetch(s + "/list");
    let list = await res.json();
    let ms = document.getElementById("msgs");
    ms.innerHTML = "";
    list.forEach(m => {
      let div = document.createElement("div");
      div.className = m.name === nick ? "msg me" : "msg other";
      div.innerText = m.name + "：" + m.text;
      ms.appendChild(div);
    });
    ms.scrollTop = ms.scrollHeight;
  }, 1000);
}
</script>
</body>
</html>
