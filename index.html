<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信风格聊天室</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #EBEBEB;
  padding: 10px;
}
.container {
  max-width: 450px;
  margin: 0 auto;
  background: #fff;
  height: calc(100vh - 20px);
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  background: #128C7E;
  color: white;
  text-align: center;
  padding: 14px;
  font-weight: bold;
  font-size: 16px;
}
.chat-box {
  flex: 1;
  padding: 15px;
  background: #E5DDD5;
  overflow-y: auto;
}
.input-bar {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #eee;
}
.input-bar input {
  flex: 1;
  border: none;
  outline: none;
  padding: 12px 15px;
  border-radius: 25px;
  background: #F1F1F1;
  font-size: 15px;
}
.input-bar button {
  margin-left: 10px;
  border: none;
  background: #128C7E;
  color: white;
  padding: 12px 18px;
  border-radius: 25px;
  font-weight: bold;
}
.msg {
  margin-bottom: 12px;
  max-width: 70%;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 15px;
  line-height: 1.4;
}
.me {
  background: #DCF8C6;
  margin-left: auto;
  border-bottom-right-radius: 4px;
}
.other {
  background: white;
  margin-right: auto;
  border-bottom-left-radius: 4px;
}
.login {
  padding: 30px 20px;
  text-align: center;
}
.login h3 {
  margin-bottom: 20px;
  color: #333;
}
.login input {
  width: 100%;
  padding: 12px 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 15px;
  font-size: 15px;
}
.login button {
  width: 100%;
  padding: 12px;
  background: #128C7E;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
}
</style>
</head>

<body>
<div class="container">
  <div class="header">微信风格聊天室</div>

  <div id="login" class="login">
    <h3>输入昵称开始聊天</h3>
    <input id="nick" placeholder="请输入你的昵称">
    <button onclick="start()">进入聊天</button>
  </div>

  <div id="chat" style="display:none; flex:1; flex-direction:column">
    <div class="chat-box" id="msgs"></div>
    <div class="input-bar">
      <input id="msg" placeholder="输入消息...">
      <button onclick="send()">发送</button>
    </div>
  </div>
</div>

<script>
let nick = "";
const api = "https://chat.api.mnchat.cn";

function start() {
  nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("请输入昵称");
  document.getElementById("login").style.display = "none";
  document.getElementById("chat").style.display = "flex";
  load();
}

async function send() {
  let text = document.getElementById("msg").value.trim();
  if (!text || !nick) return;

  await fetch(api + "/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: nick, text })
  });

  document.getElementById("msg").value = "";
}

function load() {
  setInterval(async () => {
    let res = await fetch(api + "/list");
    let list = await res.json();
    let box = document.getElementById("msgs");
    box.innerHTML = "";

    list.forEach(m => {
      let div = document.createElement("div");
      div.className = "msg " + (m.name === nick ? "me" : "other");
      div.innerText = m.text;
      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  }, 1000);
}
</script>
</body>
</html>
